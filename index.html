<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Sistema KH</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        /* ======================================================
           BASE Y FONDO AZUL PROFUNDO
           ====================================================== */
        body {
            background-color: #010612;
            background: radial-gradient(circle at top left, #021a42 0%, #010612 80%);
            color: #ffffff;
            font-family: 'Varela Round', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ======================================================
           ESTRUCTURA PRINCIPAL (FLEXBOX)
           ====================================================== */
        .layout {
            display: flex;
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
            gap: 40px; /* Espacio entre el menú y los proyectos */
            align-items: flex-start; /* Para que la barra no se estire hacia abajo */
        }

        /* ======================================================
           BARRA LATERAL (MENÚ DE COMANDOS TIPO KH)
           ====================================================== */
        .sidebar {
            width: 280px;
            flex-shrink: 0; /* Evita que el menú se encoja */
            position: sticky;
            top: 50px; /* Hace que el menú se quede fijo al hacer scroll */
        }

        .perfil {
            background: linear-gradient(135deg, rgba(30, 80, 180, 0.7), rgba(5, 20, 50, 0.7));
            backdrop-filter: blur(5px);
            padding: 30px 20px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid rgba(0, 217, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
            margin-bottom: 30px;
        }

        .perfil h1 {
            margin: 0;
            font-size: 2em;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 217, 255, 1);
        }

        .perfil .subtitle {
            color: #a0dfff;
            font-size: 1em;
            margin-top: 10px;
        }

        /* Botones del Menú de Comandos */
        .menu-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            background: linear-gradient(90deg, rgba(15, 45, 100, 0.8), rgba(2, 12, 32, 0.8));
            border: 2px solid rgba(0, 217, 255, 0.3);
            color: #ffffff;
            font-family: inherit;
            font-size: 1.2em;
            padding: 15px 25px;
            border-radius: 50px; /* Botones totalmente redondos (cápsula) */
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Efecto al pasar el ratón (Como elegir "Magia" o "Atacar") */
        .menu-btn:hover {
