<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanielGodoy - Portfolio</title>
    <style>
        /* ======================================================
           RESET TOTAL
           ====================================================== */
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-color: #000000;
            display: flex;
            flex-direction: column;
        }

        /* ======================================================
           CABECERA (Brillo reducido al 30%)
           ====================================================== */
        .cabecera-contenedor {
            width: 100%;
            border-bottom: 4px solid #000000;
            display: flex;
            flex-direction: column;
        }

        .cabecera-top {
            background: 
                radial-gradient(ellipse 150% 100% at 50% 0%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 60%),
                linear-gradient(to bottom, #00b3b3 0%, #005f5f 100%);
            padding: 15px 30px 10px 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: inset 0px 4px 8px rgba(255, 255, 255, 0.4);
        }

        .cabecera-top h1 {
            margin: 0;
            font-size: 2.8em;
            color: #ffffff;
            text-shadow: 2px 2px 0px #000000;
            letter-spacing: -1px;
        }

        .cabecera-bottom {
            background: linear-gradient(to bottom, #002626 0%, #001212 100%);
            padding: 12px 30px; 
            box-shadow: inset 0px 3px 5px rgba(0,0,0,0.6);
        }

        .cabecera-bottom p {
            color: #00ffff;
            font-size: 1.1em;
            margin: 0;
            font-weight: bold;
            text-shadow: 1px 1px 0px #000000;
        }

        /* ======================================================
           CUERPO DIVIDIDO
           ====================================================== */
        .cuerpo-dividido {
            display: flex;
            flex-grow: 1;
            width: 100%;
        }

        /* ======================================================
           MENÚ LATERAL (¡ESTA ES LA PARTE QUE SE BORRÓ!)
           ====================================================== */
        .menu-lateral {
            width: 250px;
            background-color: #0d1b1e;
            border-right: 4px solid #000000;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: inset -5px 0px 10px rgba(0,0,0,0.5);
        }

        /* ======================================================
           BOTONES PASTILLA (Reflejo domado + Legibilidad)
           ====================================================== */
        .boton-ovalo {
            width: 100%;
            border-radius: 50px;
            background: 
                linear-gradient(to right, rgba(0, 30, 30, 0.6) 0%, transparent 15%, transparent 85%, rgba(0, 30, 30, 0.6) 100%),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.05) 48%, transparent 49%),
                linear-gradient(to bottom, #00e6e6 0%, #00b3b3 48%, #006666 48%, #003333 100%);
            border: 2px solid #000000;
            color: #ffffff;
            font-family: 'Trebuchet MS', sans-serif;
            font-weight: bold;
            font-size: 1.2em;
            padding: 10px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s ease-out;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            box-shadow: 
                inset 0px 6px 8px rgba(255, 255, 255, 0.4), 
                inset 0px -4px 6px rgba(0, 0, 0, 0.7), 
                4px 4px 0px #000000;
        }

        .boton-ovalo:hover {
            transform: translate(-2px, -2px);
            box-shadow: 
                inset 0px 6px 8px rgba(255, 255, 255, 0.6), 
                inset 0px -4px 6px rgba(0, 0, 0, 0.7), 
                6px 6px 0px #000000;
            filter: brightness(1.1); 
        }

        .boton-ovalo:active {
            transform: translate(2px, 2px);
            box-shadow: 
                inset 0px 6px 8px rgba(0, 0, 0, 0.5), 
                inset 0px -2px 4px rgba(255, 255, 255, 0.1), 
                1px 1px 0px #000000;
            filter: brightness(0.9);
        }

        /* ======================================================
           CAJA DE CONTENIDO
           ====================================================== */
        .caja-contenido {
            flex-grow: 1;
            background-color: #022026;
            background: radial-gradient(circle at center, #003333 0%, #011417 100%);
            padding: 30px;
            overflow-y: auto; 
            box-sizing: border-box;
            box-shadow: inset 5px 5px 15px rgba(0, 0, 0, 0.8);
        }

        .caja-contenido h2 {
            color: #00ffff;
            border-bottom: 2px dashed #008b8b;
            padding-bottom: 5px;
            margin-top: 0;
            text-shadow: 2px 2px 0px #000000;
        }

        .caja-contenido p {
            color: #c4f5f5;
            font-size: 1.1em;
            line-height: 1.4;
        }

        .proyecto-retro {
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid #005f5f;
            padding: 15px;
            margin-bottom: 20px;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <header class="cabecera-contenedor">
        <div class="cabecera-top">
            <h1>Daniel Godoy Ondoño</h1>
        </div>
        <div class="cabecera-bottom">
            <p>Programador de Unreal & Unity</p>
        </div>
    </header>

    <div class="cuerpo-dividido">
        
        <nav class="menu-lateral">
            <button id="btn-proyectos" class="boton-ovalo">Proyectos</button>
            <button id="btn-habilidades" class="boton-ovalo">Habilidades</button>
            <button id="btn-sobremi" class="boton-ovalo">Sobre mí</button>
            <button id="btn-contacto" class="boton-ovalo">Contacto</button>
        </nav>

        <main id="pantalla-principal" class="caja-contenido">
            <h2>> Inicializando_Sistema...</h2>
            <p>Selecciona un directorio en el panel izquierdo.</p>
        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
